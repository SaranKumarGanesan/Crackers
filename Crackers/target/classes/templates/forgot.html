<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; }
.form-container { margin-top:60px; max-width:500px; }
.card { border-radius:12px; }
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<span class="navbar-brand">NeuBorn Crackers</span>
</div>
</nav>

<div class="container form-container">
<div class="card p-4">

<h3 class="text-center">Forgot Password</h3>

<form th:action="@{/forgot}" method="post">

<div class="mb-3">
<label>Email</label>
<input type="email" name="emailId" class="form-control" required>
</div>

<button class="btn btn-primary w-100">Send OTP</button>

</form>

<div class="alert alert-danger mt-3" th:if="${error}" th:text="${error}"></div>
<div class="alert alert-success mt-3" th:if="${success}" th:text="${success}"></div>

</div>
</div>

</body>
</html>
